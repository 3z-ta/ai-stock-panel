<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 股票分析面板</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AI 股票分析面板</h1>
      <p class="subtitle">实时行情 + DeepSeek AI 智能分析</p>
    </header>

    <div class="search-box">
      <input
        type="text"
        id="stockInput"
        placeholder="输入股票代码（如 AAPL、600519）"
        autocomplete="off"
      >
      <button id="searchBtn">分析</button>
      <button id="demoBtn" class="demo-btn">查看演示</button>
      <div class="market-hints">
        <span class="hint">美股：AAPL、TSLA、MSFT</span>
        <span class="hint">A股：600519、000001</span>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>正在获取数据并分析中...</p>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="result" class="result hidden">
      <div class="stock-card">
        <div class="card-header">
          <h2 id="stockName">--</h2>
          <span id="stockCode" class="code-badge"></span>
          <span id="marketBadge" class="market-badge"></span>
        </div>
        <div class="price-row">
          <span id="stockPrice" class="price">--</span>
          <span id="stockChange" class="change"></span>
        </div>
        <div class="info-grid">
          <div class="info-item">
            <span class="label">成交量</span>
            <span id="stockVolume" class="value">--</span>
          </div>
          <div class="info-item">
            <span class="label">52周高点</span>
            <span id="stockHigh" class="value">--</span>
          </div>
          <div class="info-item">
            <span class="label">52周低点</span>
            <span id="stockLow" class="value">--</span>
          </div>
          <div class="info-item">
            <span class="label">市场</span>
            <span id="stockMarket" class="value">--</span>
          </div>
        </div>
      </div>

      <div class="analysis-card">
        <div class="card-header">
          <h3>AI 分析结论</h3>
        </div>
        <p id="summary" class="summary"></p>
        <div class="analysis-tags">
          <span id="sentiment" class="tag"></span>
          <span id="riskLevel" class="tag"></span>
        </div>
        <p id="timestamp" class="timestamp"></p>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
